<!-- Widget Cagnotte — logique dans src/js/components/user/cagnotte-widget.js. -->
<template x-if="user && config.cagnotte_active">
  <div
    x-data="cagnotteWidget(user.id)"
    x-on:cagnotte-refresh.window="reload()"
    class="w-full xl:w-64 shrink-0"
    :class="{ 'col-span-2': isOpen }"
  >
    <div class="bg-white rounded-lg shadow-sm p-2 md:p-4 border border-emerald-100">
      <div class="flex items-center justify-between">
        <div>
          <h3 class="text-xs md:text-sm font-semibold text-emerald-800 uppercase tracking-wide">
            Mon Matériel
          </h3>
          <div class="text-sm md:text-xl font-bold text-emerald-600">
            <span x-text="parseFloat(balance).toFixed(2)"></span> dégaines
          </div>
        </div>
        <button
          type="button"
          x-on:click="isOpen = !isOpen"
          :class="isOpen ? 'bg-emerald-600' : 'bg-gray-800 hover:bg-black'"
          class="text-white p-1 md:p-2 rounded-lg transition-colors"
          title="Afficher mon QR Code"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v1m6 11h2m-6 0h-2v4h2v-4zM5 20h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z"
            />
          </svg>
        </button>
      </div>

      <div x-show="isOpen" class="mt-4 text-center border-t pt-4">
        <p class="text-sm text-gray-500 mb-2">Présentez ce code pour régler vos consos</p>
        <div class="flex justify-center bg-white p-2 rounded">
          <canvas x-ref="qrCanvas" class="max-w-full h-auto"></canvas>
        </div>
      </div>
    </div>
  </div>
</template>
