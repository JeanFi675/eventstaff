<!-- Widget T-shirts — logique dans src/js/components/user/tshirt-widget.js. -->
<template x-if="user && config.tshirt_question_active !== false">
  <div
    x-data="tshirtWidget(user.id)"
    x-on:tshirt-refresh.window="reload()"
    x-show="isVisible"
    class="w-full xl:w-64 shrink-0"
    :class="{ 'col-span-2': isOpen }"
  >
    <div
      class="bg-white rounded-lg shadow-sm p-2 md:p-4 border border-blue-100 tshirt-widget-content"
    >
      <div class="flex items-center justify-between">
        <div>
          <h3 class="text-xs md:text-sm font-semibold text-blue-800 uppercase tracking-wide">
            👕 Mes T-shirts
          </h3>
          <p class="text-blue-600 font-bold text-sm md:text-xl">
            <span x-text="countToCollect"></span> à récupérer
          </p>
        </div>
        <button
          type="button"
          x-on:click="toggleQR()"
          class="bg-blue-600 hover:bg-blue-800 text-white p-1 md:p-2 rounded-lg transition-colors"
          title="Afficher mon QR Code"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v1m6 11h2m-6 0h-2v4h2v-4zM5 20h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z"
            />
          </svg>
        </button>
      </div>

      <div x-show="isOpen" class="mt-4 text-center border-t pt-4">
        <p class="text-sm text-gray-500 mb-2">Présentez ce code au stand T-shirts</p>
        <div class="flex justify-center bg-white p-2 rounded">
          <canvas x-ref="qrCanvas" class="max-w-full h-auto"></canvas>
        </div>
      </div>
    </div>
  </div>
</template>
