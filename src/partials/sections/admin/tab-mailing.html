<div
  x-show="activeTab === 'mailing'"
  x-data="adminMailingTab"
  class="brutal-card bg-brutal-white p-6"
  style="display: none"
>
  <h2 class="text-3xl font-black mb-6">📧 Espace Mailing</h2>

  <!-- MAILING ET FILTRES AVANCÉS -->
  <div class="mb-8 p-4 md:p-6 bg-brutal-white border-4 border-brutal-black shadow-brutal">
    <h3 class="text-xl font-black mb-2">📧 Outil de Mailing & Filtres Avancés</h3>
    <p class="text-sm text-gray-600 mb-6">
      Sélectionnez finement vos bénévoles, prévisualisez-les en temps réel et copiez d'un clic leurs
      adresses e-mail pour vos envois groupés.
    </p>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Colonne Filtres (7 cols) -->
      <div class="lg:col-span-7 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-black uppercase mb-1">1. Rôle des bénévoles</label>
            <div class="relative">
              <select
                x-model="mailingFilterRole"
                class="w-full bg-white border-2 border-brutal-black p-2.5 font-bold text-sm focus:outline-none focus:shadow-brutal-sm cursor-pointer"
              >
                <option value="tous">👤 Tous les rôles</option>
                <option value="benevole">👤 Bénévoles uniquement</option>
                <option value="referent">👔 Référents uniquement</option>
                <option value="admin">🔐 Administrateurs uniquement</option>
              </select>
            </div>
          </div>

          <div>
            <label class="block text-xs font-black uppercase mb-1">2. Assignation générale</label>
            <div class="relative">
              <select
                x-model="mailingFilterAssignation"
                class="w-full bg-white border-2 border-brutal-black p-2.5 font-bold text-sm focus:outline-none focus:shadow-brutal-sm cursor-pointer"
              >
                <option value="tous">📋 Tous (avec ou sans poste)</option>
                <option value="avec_poste">✅ Ayant au moins un poste assigné</option>
                <option value="sans_poste">❌ Sans aucun poste assigné (sans poste)</option>
                <option value="poste_specifique">🎯 Sélectionner des postes spécifiques...</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Zone de sélection par poste et créneau -->
        <div
          x-show="mailingFilterAssignation === 'poste_specifique'"
          x-transition
          class="border-4 border-brutal-black p-4 md:p-6 bg-yellow-50 relative mt-6"
        >
          <h4 class="text-md font-black mb-4 uppercase tracking-wider">
            🎯 Sélection par Poste & Créneau
          </h4>

          <div class="space-y-6">
            <template x-for="(line, idx) in mailingPostLines" :key="line.id">
              <div class="border-2 border-brutal-black p-4 bg-white shadow-brutal-sm relative">
                <!-- Header Ligne -->
                <div class="flex justify-between items-center mb-3">
                  <span
                    class="text-xs font-black uppercase bg-brutal-black text-white px-2 py-1"
                    x-text="`Ligne de Poste #${idx + 1}`"
                  ></span>

                  <button
                    @click="removeMailingPostLine(idx)"
                    class="text-xs font-black text-red-500 hover:text-red-700 hover:underline flex items-center gap-1"
                  >
                    🗑️ Supprimer cette ligne
                  </button>
                </div>

                <!-- Dropdown Titre Poste -->
                <div class="mb-4">
                  <label class="block text-[10px] font-black uppercase text-gray-500 mb-1"
                    >Choisir le type de poste</label
                  >
                  <select
                    x-model="line.selectedTitle"
                    @change="line.selectedSlots = []"
                    class="w-full bg-white border-2 border-brutal-black p-2 font-bold text-xs focus:outline-none cursor-pointer"
                  >
                    <option value="">-- Choisir un poste --</option>
                    <template x-for="title in uniquePosteTitres" :key="title">
                      <option :value="title" x-text="title"></option>
                    </template>
                  </select>
                </div>

                <!-- Checkboxes Créneaux Horaires -->
                <div x-show="line.selectedTitle" x-transition>
                  <label class="block text-[10px] font-black uppercase text-gray-500 mb-2"
                    >Sélectionner un ou plusieurs créneaux</label
                  >

                  <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                    <template
                      x-for="slot in getSlotsForPostTitle(line.selectedTitle)"
                      :key="slot.id"
                    >
                      <label
                        class="flex items-center gap-3 border-2 border-gray-200 hover:border-brutal-black p-3 bg-gray-50 hover:bg-white transition-all cursor-pointer select-none"
                      >
                        <input
                          type="checkbox"
                          :value="slot.id"
                          x-model="line.selectedSlots"
                          class="w-4 h-4 accent-brutal-black cursor-pointer"
                        />
                        <div class="text-xs">
                          <span class="font-black" x-text="slot.periode_nom"></span>
                          <div
                            class="text-gray-500 font-bold"
                            x-text="`${formatTime(slot.periode_debut)} - ${formatTime(slot.periode_fin)}`"
                          ></div>
                          <div
                            class="text-[10px] mt-0.5 font-black"
                            :class="slot.inscrits_actuels === 0 ? 'text-red-500' : 'text-green-600'"
                          >
                            👤 <span x-text="`${slot.inscrits_actuels} inscrit(s)`"></span>
                          </div>
                        </div>
                      </label>
                    </template>
                  </div>
                </div>
              </div>
            </template>
          </div>

          <!-- Ajouter un poste -->
          <button
            @click="addMailingPostLine()"
            class="mt-4 brutal-btn px-4 py-2 font-black border-2 border-brutal-black bg-white hover:bg-gray-100 shadow-brutal-sm active:scale-95 transition-all text-xs flex items-center gap-1.5 uppercase"
          >
            ➕ Ajouter un autre poste
          </button>
        </div>
      </div>

      <!-- Colonne Aperçu & Action (5 cols) -->
      <div class="lg:col-span-5 flex flex-col justify-between">
        <div
          class="border-4 border-brutal-black p-4 bg-blue-50 shadow-brutal-sm flex-grow flex flex-col"
        >
          <div class="flex justify-between items-center mb-3">
            <h4 class="text-sm font-black uppercase tracking-wider">👀 Aperçu des bénévoles</h4>
            <span
              class="px-2.5 py-0.5 bg-brutal-black text-white text-xs font-black"
              x-text="`${getFilteredMailingBenevoles().length} ciblé(s)`"
            ></span>
          </div>

          <!-- Liste des Bénévoles -->
          <div
            class="border-2 border-brutal-black bg-white p-3 overflow-y-auto flex-grow max-h-[400px] min-h-[180px]"
          >
            <template x-if="getFilteredMailingBenevoles().length === 0">
              <div
                class="flex flex-col items-center justify-center h-full py-12 text-gray-500 italic text-xs"
              >
                <span>😴 Aucun bénévole ciblé pour le moment.</span>
              </div>
            </template>
            <template x-if="getFilteredMailingBenevoles().length > 0">
              <div class="flex flex-wrap gap-1.5 align-content-start">
                <template x-for="b in getFilteredMailingBenevoles()" :key="b.id">
                  <span
                    class="inline-flex items-center gap-1.5 text-[11px] font-black px-2.5 py-1 border-2 border-brutal-black shadow-[1.5px_1.5px_0px_rgba(0,0,0,1)] bg-white hover:translate-y-[-0.5px] transition-transform"
                  >
                    <span
                      class="text-xs"
                      x-text="b.role === 'admin' ? '🔐' : (b.role === 'referent' ? '👔' : '👤')"
                    ></span>
                    <span x-text="`${b.prenom} ${b.nom}`"></span>
                    <span class="text-gray-400 font-mono text-[9px]" x-text="`<${b.email}>`"></span>
                  </span>
                </template>
              </div>
            </template>
          </div>
        </div>

        <!-- Bouton de copie -->
        <button
          @click="copyMailingEmails()"
          :disabled="getFilteredMailingEmails().length === 0"
          class="mt-4 brutal-btn w-full px-6 py-4 font-black border-4 border-brutal-black bg-yellow-400 hover:bg-yellow-300 shadow-brutal active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3 uppercase tracking-wider text-xs md:text-sm"
        >
          📋 Copier les <span x-text="getFilteredMailingEmails().length"></span> e-mail(s)
        </button>
      </div>
    </div>
  </div>
</div>
