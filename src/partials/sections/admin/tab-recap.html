<div x-show="activeTab === 'recap'" x-data="adminRecapTab" class="brutal-card bg-brutal-white p-6">
  <h2 class="text-3xl font-black mb-6">📊 Récapitulatif</h2>

  <!-- CONFIGURATION -->
  <div
    class="mb-8 p-4 md:p-6 bg-brutal-white border-4 border-brutal-black shadow-brutal flex flex-col gap-6"
  >
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
      <div class="text-center md:text-left">
        <h3 class="text-2xl font-black">⚙️ Configuration</h3>
        <p class="text-gray-600 font-bold">Gérer les fonctionnalités globales de l'application.</p>
      </div>
      <div
        class="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto justify-center md:justify-end"
      >
        <div
          class="md:mr-8 text-right flex flex-col gap-1 w-full md:w-auto items-center md:items-end"
          x-show="stats.cagnotte"
        >
          <div
            class="flex items-center justify-end gap-2 text-sm font-bold text-gray-500 uppercase tracking-wider"
          >
            <span>Distribué</span>
            <span class="text-xs">vs</span>
            <span class="text-red-600">Consommé</span>
          </div>
          <div class="text-xl font-black flex items-center justify-end gap-2">
            <span
              class="text-brutal-black"
              x-text="(stats.cagnotte.total_distribue || 0) + ' D'"
            ></span>
            <span class="text-gray-300">|</span>
            <span
              class="text-red-600"
              x-text="'-' + (stats.cagnotte.total_consomme || 0) + ' D'"
            ></span>
          </div>
          <div class="text-xs font-bold text-gray-400 mt-1 flex justify-end gap-1">
            <span>Reste:</span>
            <span
              class="text-emerald-600"
              x-text="(stats.cagnotte.total_restant || 0) + ' D'"
            ></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="grid md:grid-cols-2 gap-8">
    <!-- T-SHIRTS -->
    <div class="border-4 border-brutal-black p-4 bg-blue-50">
      <h3 class="text-2xl font-black mb-4 border-b-2 border-brutal-black pb-2">👕 T-Shirts</h3>

      <template x-if="stats.tshirts && Object.keys(stats.tshirts).length > 0">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b-2 border-brutal-black">
              <th class="py-2 font-black">Taille</th>
              <th class="py-2 font-black text-right">Quantité</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="(count, size) in stats.tshirts" :key="size">
              <tr class="border-b border-gray-300">
                <td class="py-2 font-bold" x-text="size || 'Non défini'"></td>
                <td class="py-2 text-right font-mono text-lg" x-text="count"></td>
              </tr>
            </template>
            <tr class="bg-brutal-black text-brutal-white">
              <td class="py-2 pl-2 font-black">TOTAL</td>
              <td class="py-2 pr-2 text-right font-mono text-lg" x-text="stats.total_tshirts"></td>
            </tr>
          </tbody>
        </table>
      </template>
      <div
        x-show="!stats.tshirts || Object.keys(stats.tshirts).length === 0"
        class="italic text-gray-500"
      >
        Aucune donnée de T-shirt.
      </div>
    </div>

    <!-- REPAS -->
    <div class="border-4 border-brutal-black p-4 bg-yellow-50">
      <h3 class="text-2xl font-black mb-4 border-b-2 border-brutal-black pb-2">
        🍽️ Repas Bénévoles (soir)
      </h3>

      <table class="w-full text-left border-collapse">
        <tbody>
          <template x-for="(repStat, repasId) in stats.repas" :key="repasId">
            <tr class="border-b-2 border-brutal-black last:border-b-0">
              <td class="py-4 font-bold text-lg" x-text="repStat.nom"></td>
              <td class="py-4 text-right">
                <span class="font-black text-2xl" x-text="repStat.total"></span>
                <div
                  class="text-sm text-gray-600 font-bold mt-1"
                  x-show="repStat.question_vege_active !== false"
                >
                  <span x-text="repStat.normal"></span> normaux,
                  <span class="text-green-600" x-text="repStat.vege"></span> végé
                </div>
              </td>
            </tr>
          </template>
          <template x-if="Object.keys(stats.repas || {}).length === 0">
            <tr>
              <td colspan="2" class="py-4 text-center italic text-gray-500 font-bold">
                Aucun repas configuré.
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</div>
